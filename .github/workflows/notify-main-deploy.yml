name: Notificar autodespliegue en main

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar correo de despliegue
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[OK] ${{ github.event.head_commit.message }} - ${{ github.repository }}"
          to: ${{ secrets.MAIL_TO }}
          from: GitHub Actions
          html_body: |
            <h2>Se ha hecho push a main y se ha lanzado el autodespliegue.</h2>
            <p>
              Repo: ${{ github.repository }}<br />
              Rama: ${{ github.ref_name }}<br />
              Commit: ${{ github.sha }}<br />
              Mensaje commit: ${{ github.event.head_commit.message }}<br />
              Autor: ${{ github.actor }}<br />
              Run: <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">Ver ejecución</a>
            </p>
            <p><a href="https://jolmos98.github.io/newsletters/">JOS Digest</a>.</p>
